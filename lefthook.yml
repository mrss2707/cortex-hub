pre-commit:
  parallel: true
  commands:
    pnpm_build:
      run: pnpm build
    pnpm_typecheck:
      run: pnpm typecheck
    pnpm_lint:
      run: pnpm lint

pre-push:
  parallel: true
  commands:
    pnpm_build:
      run: pnpm build
    pnpm_typecheck:
      run: pnpm typecheck
    pnpm_lint:
      run: pnpm lint
    pnpm_test:
      run: pnpm test
